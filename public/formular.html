<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Înregistrare Cursant</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            color: #333;
            font-size: 22px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

            input:focus {
                border-color: #007bff;
                outline: none;
            }

        .help-text {
            font-size: 12px;
            color: #6c757d;
            margin-top: 4px;
            display: block;
        }

        .btn {
            background-color: #1e7e34;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

            .btn:hover {
                background-color: #155d27;
            }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Înregistrare Cursant (Register API)</h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Nume Complet:</label>
                <input type="text" id="name" placeholder="Ex: George Munteanu">
                <small class="help-text">Introdu numele tău complet. Spațiile de la început/sfârșit vor fi eliminate automat.</small>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="text" id="email" placeholder="Ex: student@scoala.ro">
                <small class="help-text">Format obligatoriu: trebuie să conțină <strong>@</strong> și un punct urmat de extensie (ex: .ro, .com).</small>
            </div>

            <div class="form-group">
                <label>Parolă:</label>
                <input type="password" id="password" placeholder="Minim 6 caractere">
                <small class="help-text">Alege o parolă sigură de <strong>cel puțin 6 caractere</strong> (litere sau cifre).</small>
            </div>

            <button type="submit" class="btn">Trimite la Endpoint-ul /api/auth/register</button>
        </form>

        <div id="responseAlert" class="alert"></div>

        <a href="index.html" class="back-link">⬅️ Înapoi la Status</a>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('responseAlert');

            alertBox.style.display = 'none';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    alertBox.className = 'alert alert-danger';
                    alertBox.innerText = '❌ Status 400 - Eroare: ' + (data.message || 'Eroare necunoscută');
                    alertBox.style.display = 'block';
                } else {
                    alertBox.className = 'alert alert-success';
                    alertBox.innerText = '✔️ Status 201 - Înregistrare reușită! Token generat.';
                    alertBox.style.display = 'block';
                    document.getElementById('registerForm').reset();
                }

            } catch (error) {
                alertBox.className = 'alert alert-danger';
                alertBox.innerText = '❌ Eroare internă de server!';
                alertBox.style.display = 'block';
            }
        });
    </script>

</body>
</html>
